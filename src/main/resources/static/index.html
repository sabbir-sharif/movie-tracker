<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wizard Auth Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Almendra&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-container">

  <!-- 🧙 LOGIN SIDE -->
  <div class="auth-panel login-panel">
    <h2>🔮 Login</h2>

    <form id="loginForm">
      <input type="email" placeholder="Owl Mail (Email)" id="loginEmail" required>
      <input type="password" placeholder="Secret Spell (Password)" id="loginPassword" required>

      <button type="submit">Enter Hogwarts</button>
    </form>
  </div>

  <!-- 🪄 SIGNUP SIDE -->
  <div class="auth-panel signup-panel">
    <h2>🪶 Signup</h2>

    <form id="signupForm">
      <input type="text" placeholder="Wizard Name" id="signupName" required>
      <input type="email" placeholder="Owl Mail (Email)" id="signupEmail" required>
      <input type="password" placeholder="Create Spell (Password)" id="signupPassword" required>

      <button type="submit">Join the Order</button>
    </form>
  </div>

</div>

<script src="js/auth.js"></script>
</body>
</html>
